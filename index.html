<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Hoops Lab</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="nameScreen" class="screen">
      <div class="card name-card">
        <p class="badge">Physics Hoops Lab</p>
        <h1>Enter Your Player Name</h1>
        <p class="sub">
          Use physics to make the perfect shot.
        </p>
        <label for="playerNameInput">Player Name</label>
        <input id="playerNameInput" maxlength="18" placeholder="e.g. Arc Master" />
        <button id="enterLabBtn" class="btn btn-primary">Continue</button>
        <p id="nameMessage" class="message"></p>
      </div>
    </section>

    <section id="levelScreen" class="screen hidden">
      <div class="card level-card">
        <h2>Welcome, <span id="welcomeName"></span></h2>
        <p class="sub">Choose difficulty and test your physics instincts.</p>
        <div class="level-grid">
          <button class="level-option selected" data-level="easy">
            <strong>Easy</strong>
            <span>All factors are controllable.</span>
          </button>
          <button class="level-option" data-level="medium">
            <strong>Medium</strong>
            <span>Locked crosswind challenges your aim.</span>
          </button>
          <button class="level-option" data-level="hard">
            <strong>Hard</strong>
            <span>Locked high drag kills speed fast.</span>
          </button>
        </div>
        <div class="level-actions">
          <button id="startGameBtn" class="btn btn-primary">Start Game</button>
          <button id="changeNameBtn" class="btn btn-secondary">Change Name</button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen hidden">
      <header class="card topbar">
        <div>
          <h2>Physics Hoops Lab</h2>
          <p><strong id="hudName"></strong> · <span id="hudLevel"></span></p>
        </div>
        <p id="lockInfo" class="lock-info"></p>
      </header>

      <div class="layout">
        <section class="card court-card">
          <canvas id="courtCanvas" width="980" height="560" aria-label="Basketball physics simulator"></canvas>
        </section>

        <aside class="card panel">
          <div class="stats">
            <div><span>Score</span><strong id="scoreStat">0</strong></div>
            <div><span>Shots</span><strong id="shotsStat">0</strong></div>
            <div><span>Streak</span><strong id="streakStat">0</strong></div>
            <div><span>Best</span><strong id="bestStat">0</strong></div>
          </div>

          <div class="control-row">
            <label for="angleInput">Angle <span id="angleValue">52°</span></label>
            <input id="angleInput" type="range" min="20" max="85" value="52" />
          </div>

          <div class="control-row">
            <label for="powerInput">Power <span id="powerValue">58</span></label>
            <input id="powerInput" type="range" min="30" max="92" value="58" />
          </div>

          <div class="control-row">
            <label for="gravityInput">Gravity <span id="gravityValue">9.8</span></label>
            <input id="gravityInput" type="range" min="6" max="14" step="0.1" value="9.8" />
          </div>

          <div class="control-row">
            <label for="windInput">Wind <span id="windValue">0.0</span></label>
            <input id="windInput" type="range" min="-18" max="18" step="0.1" value="0" />
          </div>

          <div class="control-row">
            <label for="dragInput">Drag <span id="dragValue">0.010</span></label>
            <input id="dragInput" type="range" min="0.003" max="0.028" step="0.001" value="0.010" />
          </div>

          <div class="preview-row">
            <input id="previewToggle" type="checkbox" checked />
            <label for="previewToggle">Show trajectory preview</label>
          </div>

          <div class="actions">
            <button id="shootBtn" class="btn btn-primary">Shoot</button>
            <button id="resetBtn" class="btn btn-secondary">Reset Shot</button>
            <button id="backBtn" class="btn btn-secondary">Back to Levels</button>
          </div>

          <p id="feedbackMessage" class="message">Tune the sliders and shoot.</p>
        </aside>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
